server:
  port: 8989

url:
  solr: http://localhost:8983/solr/gwas_diagram/update?commitWithin=100
  server: http://localhost:8983/solr/gwas_diagram

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.driver.OracleDriver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        enable_lazy_load_no_trans:true
